name: Deploy Quarto Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install SASS
        run: npm install -g sass

      - name: Compile SCSS to CSS
        run: sass styles.scss styles.css

      - name: Clean previous build
        run: rm -rf docs

      - name: Render site
        run: quarto render

      - name: Cache-bust Community map images
        run: |
          FILE="docs/community_building/community.html"
          SHA="${GITHUB_SHA::7}"
          sed -i -E "s#(../misc/partner_map\.png)(\?v=[^\"<]*)?#\1?v=${SHA}#g" "$FILE"
          sed -i -E "s#(../misc/coauthor_map[^\"<]*\.png)(\?v=[^\"<]*)?#\1?v=${SHA}#g" "$FILE"

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
